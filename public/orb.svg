<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="orbGradient" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#8a2be2;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#4b0082;stop-opacity:0.9" />
      <stop offset="70%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000014;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="highlightGradient" cx="30%" cy="25%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:white;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="50" cy="50" r="48" fill="url(#glowGradient)" />

  <!-- Main orb -->
  <circle cx="50" cy="50" r="40" fill="url(#orbGradient)" />

  <!-- Inner glow -->
  <circle cx="50" cy="50" r="25" fill="url(#glowGradient)" opacity="0.5" />

  <!-- Highlight -->
  <ellipse cx="38" cy="35" rx="12" ry="8" fill="url(#highlightGradient)" />

  <!-- Small sparkle -->
  <circle cx="35" cy="32" r="2" fill="white" opacity="0.8" />
</svg>
